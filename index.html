<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मीशो लाइट</title>
<style>
  /* ============================================================
     MEESHO LITE v3 — FULL-STACK QVGA (240x320) KEYPAD PROTOTYPE
     Frontend fetches /api/products and posts to /api/orders.
     Trilingual (हिंदी / भोजपुरी / தமிழ்) · '*' cycles language
     ============================================================ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --meesho-pink: #F43397;
    --meesho-dark: #B01E6E;
    --cod-green:   #0A8A3C;
    --ink:         #222222;
    --muted:       #6b6b6b;
    --paper:       #ffffff;
    --bg:          #f5f2f4;
    --line:        #e4dde1;
  }

  html, body {
    height: 100%;
    background: #1c1420;
    font-family: "Noto Sans", "Noto Sans Devanagari", "Noto Sans Tamil",
                 "Segoe UI", Arial, sans-serif;
    color: var(--ink);
  }

  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .stage-title { color: #d9c9d4; font-size: 12px; letter-spacing: 1px; }

  .handset {
    background: #2a2130;
    border-radius: 18px;
    padding: 14px 12px 10px;
    box-shadow: 0 18px 50px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);
  }

  /* --- THE HARD 240x320 SCREEN BOUND --- */
  #screen {
    width: 240px;
    height: 320px;
    background: var(--bg);
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    border: 2px solid #000;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  #screen::-webkit-scrollbar { display: none; }

  .softkeys {
    width: 240px;
    margin: 6px auto 0;
    display: flex;
    justify-content: space-between;
    color: #cbb8c6;
    font-size: 9px;
    gap: 4px;
  }

  #langToast {
    position: absolute;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    background: rgba(34,34,34,.92);
    color: #fff;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 12px;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    white-space: nowrap;
  }
  #langToast.show { opacity: 1; }

  /* ============ FOCUS ENGINE VISUALS ============ */
  .nav-item { cursor: pointer; }
  .nav-item:focus { outline: none; }
  .focused {
    outline: 3px solid var(--meesho-pink) !important;
    outline-offset: -3px;
    background-color: #fde8f3 !important;
  }
  input.focused { background-color: #fff0f8 !important; }

  /* ============ SHARED LAYOUT ============ */
  .view[hidden] { display: none; }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--meesho-pink);
    color: #fff;
    padding: 6px 8px;
    border-bottom: 2px solid var(--meesho-dark);
    position: sticky;
  }
  #feedHeader { position: sticky; }
  .brand { font-size: 14px; font-weight: 700; letter-spacing: .5px; }

  /* --- live search input + autocomplete layer --- */
  .search-wrap { position: relative; margin-top: 5px; }
  #searchBox {
    width: 100%;
    background: #fff;
    color: var(--ink);
    font-size: 11px;
    padding: 4px 6px;
    border-radius: 3px;
    border: 1px solid var(--meesho-dark);
    font-family: inherit;
  }
  #searchBox::placeholder { color: var(--muted); }
  #suggList {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    z-index: 30;
    background: var(--paper);
    border: 1px solid var(--meesho-dark);
    border-top: none;
    border-radius: 0 0 4px 4px;
    box-shadow: 0 6px 12px rgba(0,0,0,.25);
    max-height: 130px;
    overflow: hidden;
  }
  #suggList[hidden] { display: none; }
  .sugg-item {
    padding: 6px 8px;
    font-size: 11px;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sugg-item:last-child { border-bottom: none; }
  .sugg-item b { color: var(--meesho-dark); }

  .section-label {
    font-size: 10px;
    letter-spacing: .5px;
    color: var(--muted);
    padding: 6px 8px 2px;
    font-weight: 700;
  }

  /* status blocks: catalog loading / network error / empty search */
  .status-block {
    margin: 14px 10px;
    padding: 12px 8px;
    background: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 4px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  .retry-btn {
    display: block;
    margin: 8px auto 0;
    padding: 6px 14px;
    width: fit-content;
    background: var(--meesho-pink);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
  }

  /* ============ VIEW A: FEED ============ */
  .cat-ribbon {
    display: flex;
    gap: 4px;
    padding: 4px 6px;
    overflow-x: auto;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    scrollbar-width: none;
  }
  .cat-ribbon::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex: 0 0 auto;
    font-size: 11px;
    padding: 4px 9px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #faf7f9;
    white-space: nowrap;
  }
  .cat-chip.active {
    background: var(--meesho-dark);
    color: #fff;
    border-color: var(--meesho-dark);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 6px;
  }
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .card-img {
    width: 100%;
    height: 78px;
    display: block;
    object-fit: cover;
    background: #efe9ed;
  }
  .card-body { padding: 4px 5px 6px; }
  .card-title {
    font-size: 11px;
    line-height: 1.25;
    height: 27px;
    overflow: hidden;
  }
  .card-price { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .cod-badge {
    display: inline-block;
    margin-top: 2px;
    font-size: 9px;
    font-weight: 700;
    color: var(--cod-green);
    letter-spacing: .2px;
  }

  /* ============ VIEW B: PDP ============ */
  .pdp-back, .chk-back {
    display: inline-block;
    margin: 6px 8px 0;
    font-size: 11px;
    color: var(--meesho-dark);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 3px 8px;
  }
  .pdp-imgframe {
    width: 180px;
    height: 180px;
    margin: 8px auto 6px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .pdp-imgframe img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #efe9ed;
  }
  .pdp-info { padding: 0 10px; text-align: center; }
  .pdp-title { font-size: 13px; font-weight: 600; }
  .pdp-price { font-size: 16px; font-weight: 800; margin: 2px 0; }
  .pdp-price .mrp {
    font-size: 10px;
    color: var(--muted);
    text-decoration: line-through;
    font-weight: 400;
    margin-left: 4px;
  }
  .pdp-rating { font-size: 10px; color: var(--cod-green); font-weight: 700; }

  .size-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 8px 0;
  }
  .size-box {
    min-width: 34px;
    height: 30px;
    padding: 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 15px;
    font-size: 11px;
    font-weight: 600;
  }
  .size-box.selected {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .buy-btn {
    display: block;
    width: 210px;
    margin: 6px auto 12px;
    padding: 10px 0;
    text-align: center;
    background: var(--meesho-pink);
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .3px;
    border: none;
    border-radius: 4px;
    border-bottom: 3px solid var(--meesho-dark);
    font-family: inherit;
  }
  .buy-btn small { display: block; font-weight: 400; font-size: 10px; }

  /* ============ VIEW C: CHECKOUT + TRACKER ============ */
  .chk-form { padding: 6px 10px 10px; }
  .field { margin-bottom: 8px; }
  .field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 2px;
    letter-spacing: .2px;
  }
  .field input {
    width: 100%;
    padding: 6px;
    font-size: 12px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink);
    font-family: inherit;
  }
  .err {
    font-size: 9px;
    color: #c62828;
    margin-top: 2px;
    display: none;
  }
  .err.show { display: block; }
  .form-err {
    font-size: 10px;
    color: #c62828;
    text-align: center;
    margin-bottom: 6px;
    display: none;
    line-height: 1.4;
  }
  .form-err.show { display: block; }

  .place-btn {
    width: 100%;
    padding: 9px 0;
    background: var(--cod-green);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    border: none;
    border-radius: 4px;
    border-bottom: 3px solid #06612a;
    letter-spacing: .3px;
    font-family: inherit;
  }
  .place-btn.busy { opacity: .65; }

  /* Vertical order pipeline — strict flex-column so expanded
     regional scripts push blocks apart, never overlap them. */
  .tracker {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    padding: 8px 12px 10px;
  }
  .order-id {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-align: center;
    font-size: 11px;
    line-height: 1.45;
    color: var(--muted);
    padding: 6px 4px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow-wrap: break-word;
    word-break: break-word;
    min-height: 0;
  }
  .order-id b { color: var(--ink); }
  .order-id .oid-row { display: block; width: 100%; }

  .pipe { list-style: none; }
  .pipe li {
    position: relative;
    padding: 0 0 16px 26px;
    font-size: 12px;
    line-height: 1.4;
    color: #9a9a9a;
    overflow-wrap: break-word;
  }
  .pipe li:last-child { padding-bottom: 2px; }
  .pipe li::before {
    content: "";
    position: absolute;
    left: 4px; top: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #d7cfd4;
    border: 2px solid #d7cfd4;
  }
  .pipe li::after {
    content: "";
    position: absolute;
    left: 9px; top: 18px;
    width: 2px;
    height: calc(100% - 18px);
    background: #d7cfd4;
  }
  .pipe li:last-child::after { display: none; }
  .pipe li.done { color: var(--ink); font-weight: 600; }
  .pipe li.done::before { background: var(--cod-green); border-color: var(--cod-green); }
  .pipe li.done::after  { background: var(--cod-green); }
  .pipe li .sub {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 1px;
  }

  .trk-actions {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
  }
  .home-btn {
    display: block;
    width: 100%;
    padding: 8px 4px;
    background: var(--meesho-pink);
    border: 1px solid var(--meesho-dark);
    border-bottom-width: 3px;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    border-radius: 4px;
    text-align: center;
    line-height: 1.35;
  }
  .shop-again {
    display: block;
    width: 100%;
    padding: 8px 4px;
    background: var(--paper);
    border: 1px solid var(--meesho-dark);
    color: var(--meesho-dark);
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    text-align: center;
    line-height: 1.35;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stage-title" id="stageTitle"></div>

  <div class="handset">
    <div id="screen">

      <!-- ================= VIEW A: MARKETPLACE FEED ================= -->
      <section id="view-feed" class="view">
        <header class="app-header" id="feedHeader">
          <div class="brand" id="brandFeed"></div>
          <div class="search-wrap">
            <input type="text" id="searchBox" class="nav-item" data-action="search-input"
                   maxlength="30" autocomplete="off" spellcheck="false">
            <div id="suggList" hidden></div>
          </div>
        </header>

        <div class="section-label" id="catLabel"></div>
        <nav class="cat-ribbon" id="catRibbon"></nav>

        <div class="section-label" id="gridLabel"></div>
        <main class="grid" id="grid"></main>
        <div class="status-block" id="feedStatus" hidden></div>
      </section>

      <!-- ================= VIEW B: PRODUCT DETAIL ================= -->
      <section id="view-pdp" class="view" hidden>
        <header class="app-header">
          <div class="brand" id="brandPdp"></div>
        </header>

        <span class="pdp-back nav-item" id="backFeedBtn" data-action="back-feed"></span>

        <div class="pdp-imgframe">
          <img id="pdpImg" alt="" width="180" height="180">
        </div>

        <div class="pdp-info">
          <div class="pdp-title" id="pdpTitle"></div>
          <div class="pdp-price"><span id="pdpPrice"></span><span class="mrp" id="pdpMrp"></span></div>
          <div class="pdp-rating" id="pdpRating"></div>
        </div>

        <div class="section-label" style="text-align:center" id="sizeLabel"></div>
        <div class="size-row" id="sizeRow">
          <span class="size-box nav-item" data-action="size" data-size="38">38</span>
          <span class="size-box nav-item selected" data-action="size" data-size="40">40</span>
          <span class="size-box nav-item" data-action="size" data-size="42">42</span>
          <span class="size-box nav-item" data-action="size" data-size="44">44</span>
        </div>

        <button class="buy-btn nav-item" id="buyBtn" data-action="buy"></button>
      </section>

      <!-- ================= VIEW C: CHECKOUT + TRACKER ================= -->
      <section id="view-checkout" class="view" hidden>
        <header class="app-header">
          <div class="brand" id="chkHeading"></div>
        </header>

        <!-- C1: the order form -->
        <div id="chkForm">
          <span class="chk-back nav-item" id="backPdpBtn" data-action="back-pdp"></span>
          <div class="chk-form">
            <div class="form-err" id="formErr"></div>
            <div class="field">
              <label for="fName" id="lblName"></label>
              <input class="nav-item" data-action="input" id="fName" type="text" maxlength="40" autocomplete="off">
              <div class="err" id="eName"></div>
            </div>
            <div class="field">
              <label for="fVillage" id="lblVillage"></label>
              <input class="nav-item" data-action="input" id="fVillage" type="text" maxlength="60" autocomplete="off">
              <div class="err" id="eVillage"></div>
            </div>
            <div class="field">
              <label for="fLandmark" id="lblLandmark"></label>
              <input class="nav-item" data-action="input" id="fLandmark" type="text" maxlength="60" autocomplete="off">
            </div>
            <div class="field">
              <label for="fMob" id="lblMob"></label>
              <input class="nav-item" data-action="input" id="fMob" type="tel" maxlength="10" autocomplete="off">
              <div class="err" id="eMob"></div>
            </div>
            <button class="place-btn nav-item" id="placeBtn" data-action="place-order"></button>
          </div>
        </div>

        <!-- C2: the vertical pipeline tracker -->
        <div id="chkTracker" hidden>
          <div class="tracker">
            <div class="order-id">
              <span class="oid-row"><span id="orderIdLabel"></span>: <b id="orderId"></b></span>
              <span class="oid-row" id="codNote"></span>
            </div>
            <ul class="pipe" id="pipe">
              <li id="step1"><span class="step-main"></span><span class="sub"></span></li>
              <li id="step2"><span class="step-main"></span><span class="sub"></span></li>
              <li id="step3"><span class="step-main"></span><span class="sub"></span></li>
            </ul>
            <div class="trk-actions">
              <span class="home-btn nav-item" id="backHomeBtn" data-action="back-home"></span>
              <span class="shop-again nav-item" id="shopAgainBtn" data-action="shop-again"></span>
            </div>
          </div>
        </div>
      </section>

      <div id="langToast"></div>
    </div><!-- /#screen -->

    <div class="softkeys">
      <span id="sk1"></span>
      <span id="sk2"></span>
      <span id="sk3"></span>
    </div>
  </div>
</div>

<script>

  /* ---------------- 2. GLOBAL STATE MANAGER ---------------- */
  const state = {
    lang: "hi",
    view: "feed",             // 'feed' | 'pdp' | 'checkout'
    checkoutMode: "form",     // 'form' | 'tracker'
    catalog: { categories: [], products: [] },  // filled by /api/products
    catalogStatus: "loading", // 'loading' | 'ready' | 'error'
    activeCategory: null,
    searchQuery: null,
    currentProduct: null,
    selectedSize: "40",
    lastMilestones: null,     // structural pipeline from /api/orders
    focusEl: null,
    memory: {}
  };

  const screen = document.getElementById("screen");
  const views = {
    feed:     document.getElementById("view-feed"),
    pdp:      document.getElementById("view-pdp"),
    checkout: document.getElementById("view-checkout")
  };
  const searchBox = document.getElementById("searchBox");
  const suggList  = document.getElementById("suggList");

  function t(key) { return L[state.lang][key]; }

  /* SVG data-URI fallback so a 404 CDN image never shows a broken icon */
  function fallbackSVG(text, hue) {
    const svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180">' +
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="' + hue + '"/>' +
      '<stop offset="1" stop-color="#ffffff"/></linearGradient></defs>' +
      '<rect width="180" height="180" fill="url(#g)"/>' +
      '<text x="90" y="104" font-size="52" font-family="sans-serif" ' +
      'text-anchor="middle" fill="#7a5468">' + text + "</text></svg>";
    return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
  }

  /* ---------------- 3. CATALOG FETCH (no hardcoded inventory) ---------------- */
  async function loadCatalog() {
    state.catalogStatus = "loading";
    renderFeedStatus();
    try {
      const res = await fetch("/api/products");
      if (!res.ok) throw new Error("bad_status_" + res.status);
      const data = await res.json();
      if (!data || !Array.isArray(data.products)) throw new Error("bad_payload");
      state.catalog.categories = data.categories || [];
      state.catalog.products = data.products;
      state.catalogStatus = "ready";
      renderCategories();
      renderGrid();
      renderFeedStatus();
      if (state.view === "feed") setFocus(candidates()[0], false);
    } catch (err) {
      state.catalogStatus = "error";
      renderCategories();
      renderGrid();
      renderFeedStatus();
      if (state.view === "feed") setFocus(candidates()[0], false);
    }
  }

  function renderFeedStatus() {
    const box = document.getElementById("feedStatus");
    if (state.catalogStatus === "loading") {
      box.hidden = false;
      box.textContent = t("loading");
    } else if (state.catalogStatus === "error") {
      box.hidden = false;
      box.innerHTML = "";
      const msg = document.createElement("div");
      msg.textContent = t("netErr");
      const retry = document.createElement("span");
      retry.className = "retry-btn nav-item";
      retry.dataset.action = "retry-load";
      retry.textContent = t("retry");
      box.appendChild(msg);
      box.appendChild(retry);
    } else {
      box.hidden = true;
      box.innerHTML = "";
    }
  }

  /* ---------------- 4. RENDERERS ---------------- */
  function catName(slug) {
    const c = state.catalog.categories.find(c => c.slug === slug);
    return c ? c.names[state.lang] : "";
  }

  function renderStaticText() {
    const d = L[state.lang];
    document.documentElement.lang = d.htmlLang;
    document.getElementById("stageTitle").textContent = d.stageTitle;
    document.getElementById("brandFeed").textContent  = d.brand;
    document.getElementById("brandPdp").textContent   = d.productBrand;
    searchBox.placeholder = d.searchPh;
    document.getElementById("catLabel").textContent   = d.catLabel;
    document.getElementById("backFeedBtn").textContent = d.back;
    document.getElementById("backPdpBtn").textContent  = d.back;
    document.getElementById("sizeLabel").textContent   = d.sizeLabel;
    document.getElementById("buyBtn").innerHTML = d.buy + "<small>" + d.buySub + "</small>";
    document.getElementById("chkHeading").textContent =
      state.checkoutMode === "tracker" ? d.trkHeading : d.chkHeading;
    document.getElementById("lblName").textContent     = d.lblName;
    document.getElementById("lblVillage").textContent  = d.lblVillage;
    document.getElementById("lblLandmark").textContent = d.lblLandmark;
    document.getElementById("lblMob").textContent      = d.lblMob;
    document.getElementById("eName").textContent       = d.eName;
    document.getElementById("eVillage").textContent    = d.eVillage;
    document.getElementById("eMob").textContent        = d.eMob;
    document.getElementById("placeBtn").textContent    = d.placeOrder;
    document.getElementById("orderIdLabel").textContent = d.orderIdLabel;
    document.getElementById("codNote").textContent      = d.codNote;
    document.getElementById("shopAgainBtn").textContent = d.shopAgain;
    document.getElementById("backHomeBtn").textContent  = d.backHome;
    document.getElementById("sk1").textContent = d.sk1;
    document.getElementById("sk2").textContent = d.sk2;
    document.getElementById("sk3").textContent = d.sk3;
    renderPipelineText();
    renderFeedStatus();
  }

  function dayText(offsetDays) {
    return offsetDays === 0 ? t("dayToday") : t("dayIn").replace("{n}", String(offsetDays));
  }

  function renderPipelineText() {
    const d = L[state.lang];
    const keys = ["confirmed", "shipped", "outForDelivery"];
    const milestones = state.lastMilestones ||
      [{ key: "confirmed", offsetDays: 0 }, { key: "shipped", offsetDays: 2 }, { key: "outForDelivery", offsetDays: 4 }];
    ["step1", "step2", "step3"].forEach((id, i) => {
      const li = document.getElementById(id);
      const key = (milestones[i] && milestones[i].key) || keys[i];
      const off = milestones[i] ? milestones[i].offsetDays : [0, 2, 4][i];
      li.querySelector(".step-main").textContent = (d.steps[key] || "") + " ";
      li.querySelector(".sub").textContent = dayText(off);
    });
  }

  function renderCategories() {
    const ribbon = document.getElementById("catRibbon");
    ribbon.innerHTML = "";
    state.catalog.categories.forEach(c => {
      const chip = document.createElement("span");
      chip.className = "cat-chip nav-item" + (state.activeCategory === c.slug ? " active" : "");
      chip.dataset.action = "category";
      chip.dataset.cat = c.slug;
      chip.textContent = c.names[state.lang];
      ribbon.appendChild(chip);
    });
  }

  function matchesQuery(p, q) {
    const needle = q.toLowerCase();
    const hay = [
      p.names.hi, p.names.bho, p.names.ta
    ].concat(p.keywords || []).join(" ").toLowerCase();
    return hay.indexOf(needle) !== -1;
  }

  function renderGrid() {
    const grid  = document.getElementById("grid");
    const label = document.getElementById("gridLabel");
    grid.innerHTML = "";

    let list = state.catalog.products;
    if (state.activeCategory) list = list.filter(p => p.cat === state.activeCategory);
    if (state.searchQuery)    list = list.filter(p => matchesQuery(p, state.searchQuery));

    if (state.searchQuery) {
      label.textContent = t("resultsFor") + " \u201C" + state.searchQuery + "\u201D";
    } else if (state.activeCategory) {
      label.textContent = catName(state.activeCategory);
    } else {
      label.textContent = t("allProducts");
    }

    if (state.catalogStatus === "ready" && list.length === 0) {
      const empty = document.createElement("div");
      empty.className = "status-block";
      empty.style.gridColumn = "1 / -1";
      empty.textContent = t("noResults");
      grid.appendChild(empty);
      return;
    }

    list.forEach(p => {
      const name = p.names[state.lang];
      const card = document.createElement("article");
      card.className = "card nav-item";
      card.dataset.action = "product";
      card.dataset.id = p.id;

      const img = document.createElement("img");
      img.className = "card-img";
      img.width = 114; img.height = 78;
      img.loading = "lazy";
      img.alt = name;
      img.src = p.img;
      img.onerror = function () {
        this.onerror = null;
        this.src = fallbackSVG(name.charAt(0), p.hue || "#f7c6de");
      };

      const body = document.createElement("div");
      body.className = "card-body";
      body.innerHTML =
        '<div class="card-title">' + name + "</div>" +
        '<div class="card-price">' + p.price + "</div>" +
        '<span class="cod-badge">' + t("cod") + "</span>";

      card.appendChild(img);
      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  function renderPDP(product) {
    state.currentProduct = product;
    const name = product.names[state.lang];
    const img = document.getElementById("pdpImg");
    img.alt = name;
    img.src = product.imgLarge || product.img;
    img.onerror = function () {
      this.onerror = null;
      this.src = fallbackSVG(name.charAt(0), product.hue || "#f7c6de");
    };
    document.getElementById("pdpTitle").textContent = name;
    document.getElementById("pdpPrice").textContent = product.price;
    document.getElementById("pdpMrp").textContent = product.mrp;
    document.getElementById("pdpRating").textContent =
      product.rating + " · " + t("freeDelivery");
    document.querySelectorAll("#sizeRow .size-box").forEach(b => {
      b.classList.toggle("selected", b.dataset.size === state.selectedSize);
    });
  }

  /* ---------------- 5. AUTOCOMPLETE SEARCH ENGINE ---------------- */
  function buildSuggestions(q) {
    const needle = q.toLowerCase();
    const seen = new Set();
    const out = [];
    for (const p of state.catalog.products) {
      const pool = [p.names[state.lang]].concat(p.keywords || []);
      for (const raw of pool) {
        const s = String(raw);
        if (s.toLowerCase().indexOf(needle) === -1) continue;
        const key = s.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        out.push(s);
        if (out.length >= 5) return out;
      }
    }
    return out;
  }

  function showSuggestions() {
    const q = searchBox.value.trim();
    if (q.length === 0 || state.catalogStatus !== "ready") {
      hideSuggestions();
      return;
    }
    const matches = buildSuggestions(q);
    if (matches.length === 0) { hideSuggestions(); return; }

    suggList.innerHTML = "";
    matches.forEach(m => {
      const item = document.createElement("div");
      item.className = "sugg-item nav-item";
      item.dataset.action = "suggestion";
      item.dataset.q = m;
      item.textContent = m;
      suggList.appendChild(item);
    });
    suggList.hidden = false;
    applyTabindex();
  }

  function hideSuggestions() {
    suggList.hidden = true;
    suggList.innerHTML = "";
  }

  function applyQuery(q) {
    state.searchQuery = q && q.length > 0 ? q : null;
    searchBox.value = state.searchQuery || "";
    hideSuggestions();
    renderGrid();
    // land focus on the first result card if there is one, else stay on the box
    const firstCard = views.feed.querySelector(".card.nav-item");
    setFocus(firstCard || searchBox);
  }

  searchBox.addEventListener("input", function () {
    showSuggestions();
    if (searchBox.value.trim().length === 0 && state.searchQuery) {
      state.searchQuery = null;
      renderGrid();
    }
  });

  /* ---------------- 6. '*' LANGUAGE CYCLER (no state reset) ---------------- */
  function focusSignature(el) {
    if (!el) return null;
    if (el.id) return { by: "id", v: el.id };
    const a = el.dataset.action;
    if (a === "product")    return { by: "product", v: el.dataset.id };
    if (a === "category")   return { by: "category", v: el.dataset.cat };
    if (a === "size")       return { by: "size", v: el.dataset.size };
    if (a === "retry-load") return { by: "retry" };
    return null;
  }

  function findBySignature(sig) {
    if (!sig) return null;
    if (sig.by === "id")       return document.getElementById(sig.v);
    if (sig.by === "product")  return views[state.view].querySelector('.card[data-id="' + sig.v + '"]');
    if (sig.by === "category") return document.querySelector('.cat-chip[data-cat="' + sig.v + '"]');
    if (sig.by === "size")     return document.querySelector('.size-box[data-size="' + sig.v + '"]');
    if (sig.by === "retry")    return document.querySelector('.retry-btn');
    return null;
  }

  function cycleLanguage() {
    const sig = focusSignature(state.focusEl);
    const keepScroll = screen.scrollTop;

    state.lang = LANGS[(LANGS.indexOf(state.lang) + 1) % LANGS.length];

    hideSuggestions();
    renderStaticText();
    renderCategories();
    renderGrid();
    if (state.currentProduct) renderPDP(state.currentProduct);

    screen.scrollTop = keepScroll;

    const again = findBySignature(sig);
    if (again && candidates().includes(again)) setFocus(again, false);
    else setFocus(candidates()[0], false);

    const toast = document.getElementById("langToast");
    toast.textContent = t("langToast");
    toast.classList.add("show");
    clearTimeout(cycleLanguage._timer);
    cycleLanguage._timer = setTimeout(() => toast.classList.remove("show"), 1200);
  }

  /* ---------------- 7. VIEW ROUTER ---------------- */
  function showView(name) {
    if (state.focusEl) state.memory[state.view] = focusSignature(state.focusEl);

    hideSuggestions();
    Object.keys(views).forEach(k => { views[k].hidden = (k !== name); });
    state.view = name;
    screen.scrollTop = 0;

    const remembered = findBySignature(state.memory[name]);
    const cands = candidates();
    if (remembered && cands.includes(remembered)) setFocus(remembered);
    else setFocus(cands[0]);
  }

  /* ---------------- 8. SPATIAL FOCUS ENGINE ---------------- */
  function candidates() {
    // Modal trap: while the autocomplete layer is open, navigation is
    // restricted to the search box and its suggestion rows only.
    if (!suggList.hidden) {
      return [searchBox].concat(Array.from(suggList.querySelectorAll(".sugg-item")));
    }
    const active = views[state.view];
    return Array.from(active.querySelectorAll(".nav-item"))
      .filter(el => el.offsetParent !== null);
  }

  function setFocus(el, smooth) {
    if (!el) return;
    if (state.focusEl) state.focusEl.classList.remove("focused");
    el.classList.add("focused");
    state.focusEl = el;
    el.focus({ preventScroll: true });
    el.scrollIntoView({
      block: "nearest",
      inline: "nearest",
      behavior: smooth === false ? "auto" : "smooth"
    });
  }

  function center(rect) {
    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }

  function move(dir) {
    const cands = candidates();
    if (cands.length === 0) return;

    if (!state.focusEl || !cands.includes(state.focusEl)) {
      setFocus(cands[0]);
      return;
    }

    const from = center(state.focusEl.getBoundingClientRect());
    let best = null;
    let bestScore = Infinity;

    for (const el of cands) {
      if (el === state.focusEl) continue;
      const c = center(el.getBoundingClientRect());
      const dx = c.x - from.x;
      const dy = c.y - from.y;
      let primary, secondary;

      if (dir === "up")         { if (dy > -4) continue; primary = -dy; secondary = Math.abs(dx); }
      else if (dir === "down")  { if (dy <  4) continue; primary =  dy; secondary = Math.abs(dx); }
      else if (dir === "left")  { if (dx > -4) continue; primary = -dx; secondary = Math.abs(dy); }
      else                      { if (dx <  4) continue; primary =  dx; secondary = Math.abs(dy); }

      const score = primary + secondary * 2.5;
      if (score < bestScore) { bestScore = score; best = el; }
    }

    if (best) setFocus(best);
  }

  /* ---------------- 9. ACTION DISPATCH (Enter key) ---------------- */
  function activate() {
    const el = state.focusEl;
    if (!el) return;
    const action = el.dataset.action;

    switch (action) {
      case "search-input": {
        // Enter inside the box applies whatever is typed as the filter
        applyQuery(searchBox.value.trim());
        break;
      }
      case "suggestion": {
        // Enter on a suggestion: autofill the box, run the filter, close
        applyQuery(el.dataset.q);
        break;
      }
      case "retry-load": {
        loadCatalog();
        break;
      }
      case "category": {
        const cat = el.dataset.cat;
        state.activeCategory = (state.activeCategory === cat) ? null : cat;
        renderCategories();
        renderGrid();
        const chip = document.querySelector('.cat-chip[data-cat="' + cat + '"]');
        setFocus(chip || candidates()[0]);
        break;
      }
      case "product": {
        const product = state.catalog.products.find(p => p.id === Number(el.dataset.id));
        if (product) { renderPDP(product); showView("pdp"); }
        break;
      }
      case "size": {
        state.selectedSize = el.dataset.size;
        document.querySelectorAll("#sizeRow .size-box").forEach(b =>
          b.classList.toggle("selected", b === el));
        break;
      }
      case "buy": {
        state.checkoutMode = "form";
        document.getElementById("chkForm").hidden = false;
        document.getElementById("chkTracker").hidden = true;
        document.getElementById("chkHeading").textContent = t("chkHeading");
        document.getElementById("formErr").classList.remove("show");
        showView("checkout");
        break;
      }
      case "back-feed":   showView("feed"); break;
      case "back-pdp":    showView("pdp");  break;
      case "input":       break;
      case "place-order": placeOrder(); break;
      case "back-home": {
        resetOrderForm();
        state.activeCategory = null;
        state.searchQuery = null;
        searchBox.value = "";
        state.currentProduct = null;
        state.memory = {};
        renderCategories();
        renderGrid();
        showView("feed");
        break;
      }
      case "shop-again": {
        resetOrderForm();
        state.memory = {};
        showView("feed");
        break;
      }
    }
  }

  function resetOrderForm() {
    ["fName", "fVillage", "fLandmark", "fMob"].forEach(id => {
      document.getElementById(id).value = "";
    });
    ["eName", "eVillage", "eMob"].forEach(id => {
      document.getElementById(id).classList.remove("show");
    });
    document.getElementById("formErr").classList.remove("show");
    state.checkoutMode = "form";
    document.getElementById("chkForm").hidden = false;
    document.getElementById("chkTracker").hidden = true;
    document.getElementById("chkHeading").textContent = t("chkHeading");
  }

  /* ---------------- 10. LIVE ORDER SUBMISSION ---------------- */
  let placing = false;

  async function placeOrder() {
    if (placing) return;

    const name     = document.getElementById("fName").value.trim();
    const village  = document.getElementById("fVillage").value.trim();
    const landmark = document.getElementById("fLandmark").value.trim();
    const mobile   = document.getElementById("fMob").value.trim();

    const eName    = document.getElementById("eName");
    const eVillage = document.getElementById("eVillage");
    const eMob     = document.getElementById("eMob");
    const formErr  = document.getElementById("formErr");
    eName.classList.remove("show");
    eVillage.classList.remove("show");
    eMob.classList.remove("show");
    formErr.classList.remove("show");

    // fast client-side pass first (saves a round trip on obvious misses)
    if (!name)    { eName.classList.add("show");    setFocus(document.getElementById("fName"));    return; }
    if (!village) { eVillage.classList.add("show"); setFocus(document.getElementById("fVillage")); return; }
    if (!/^\d{10}$/.test(mobile)) { eMob.classList.add("show"); setFocus(document.getElementById("fMob")); return; }

    const btn = document.getElementById("placeBtn");
    placing = true;
    btn.classList.add("busy");
    btn.textContent = t("placing");

    try {
      const res = await fetch("/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, village, landmark, mobile })
      });
      const data = await res.json().catch(() => ({}));

      if (res.status === 400 && data && Array.isArray(data.errors)) {
        // server-side rejection: surface the exact failing fields
        if (data.errors.includes("name"))    eName.classList.add("show");
        if (data.errors.includes("village")) eVillage.classList.add("show");
        if (data.errors.includes("mobile"))  eMob.classList.add("show");
        const firstBad = data.errors.includes("name") ? "fName"
                       : data.errors.includes("village") ? "fVillage" : "fMob";
        setFocus(document.getElementById(firstBad));
        return;
      }

      if (!res.ok || !data.ok) throw new Error("order_failed");

      // success: swap the form for the tracker using the server payload
      state.lastMilestones = data.milestones || null;
      state.checkoutMode = "tracker";
      document.getElementById("chkForm").hidden = true;
      document.getElementById("chkTracker").hidden = false;
      document.getElementById("chkHeading").textContent = t("trkHeading");
      document.getElementById("orderId").textContent = String(data.orderId);
      renderPipelineText();

      const steps = ["step1", "step2", "step3"].map(id => document.getElementById(id));
      steps.forEach(s => s.classList.remove("done"));
      steps[0].classList.add("done");
      setTimeout(() => steps[1].classList.add("done"), 1200);
      setTimeout(() => steps[2].classList.add("done"), 2400);

      /* pin viewport to the top FIRST, then anchor focus instantly on the
         home node — the tracker fits inside 320px so nothing scrolls away */
      screen.scrollTop = 0;
      setFocus(document.getElementById("backHomeBtn"), false);
    } catch (err) {
      formErr.textContent = t("netErr");
      formErr.classList.add("show");
      setFocus(btn);
    } finally {
      placing = false;
      btn.classList.remove("busy");
      btn.textContent = t("placeOrder");
    }
  }

  /* ---------------- 11. INPUT LISTENERS ---------------- */
  document.addEventListener("keydown", function (e) {
    const key = e.key;

    // '*' = hardware language softkey (global interceptor)
    if (key === "*") {
      e.preventDefault();
      cycleLanguage();
      return;
    }

    const active = document.activeElement;
    const inInput = active && active.tagName === "INPUT";

    if (key === "Enter") {
      e.preventDefault();
      activate();
      return;
    }

    if (key !== "ArrowUp" && key !== "ArrowDown" &&
        key !== "ArrowLeft" && key !== "ArrowRight") return;

    // Spec mapping: while typing in the search box with the dropdown
    // open, ArrowDown jumps focus straight onto the first suggestion.
    if (active === searchBox && key === "ArrowDown" && !suggList.hidden) {
      e.preventDefault();
      const first = suggList.querySelector(".sugg-item");
      if (first) setFocus(first);
      return;
    }

    // inside any text input, Left/Right move the caret, not the focus
    if (inInput && (key === "ArrowLeft" || key === "ArrowRight")) return;

    e.preventDefault();
    move(key.replace("Arrow", "").toLowerCase());
  });

  // Desktop-judge convenience only: a click behaves like navigate + Enter.
  screen.addEventListener("click", function (e) {
    const target = e.target.closest(".nav-item");
    if (!target) return;
    setFocus(target);
    activate();
  });

  /* ---------------- 12. BOOT ---------------- */
  function applyTabindex() {
    document.querySelectorAll(".nav-item").forEach(el => {
      if (!el.hasAttribute("tabindex") && el.tagName !== "INPUT") {
        el.setAttribute("tabindex", "-1");
      }
    });
  }

  function init() {
    renderStaticText();
    new MutationObserver(applyTabindex).observe(screen, { childList: true, subtree: true });
    applyTabindex();
    setFocus(searchBox, false);
    loadCatalog();
  }

  init();
})();
</script>
</body>
